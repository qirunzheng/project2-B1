{% extends "base.html" %}

{% block content %}


<table border="1" cellpadding="8">
    <tr>
        <th>Name</th>
        <th>Country</th>
        <th>Cost</th>
    </tr>

    {% for each_place in places %}
    <tr>
        <td>{{ each_place.name }}</td>
        <td>{{ each_place.country }}</td>
        <td>{{ each_place.cost }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<h2><a href="/new_destination">Enter a new bucket list destination</a></h2>
{% endblock %}
